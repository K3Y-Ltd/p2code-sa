shuffle = false
num_workers = 1
drop_last = false

[dataset.webloader.aa2]
batch_size = 256
shuffle = false
num_workers = 1
drop_last = false

[dataset.webloader.aa3]
batch_size = 256
shuffle = false
num_workers = 1
drop_last = false

[dataset.webloader.aa4]
batch_size = 256
shuffle = false
num_workers = 1
drop_last = false

[model]
model_type = "resnet18"
