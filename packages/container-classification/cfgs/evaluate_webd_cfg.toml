device = "cuda"
use_wandb = false

[dataset]
format = "webdataset"
# path = "/home/anousias/p2code/datasets/cosoco/1024-unrolled"
# splits = ["test"]
path = "/home/anousias/p2code/datasets/aa"
splits = ["aa1", "aa2", "aa3", "aa4"]

[dataset.kw]
task = "classification"
weights = [1.0, 64.0]
patch_size = [256, 256]

[dataset.webloader.test]
batch_size = 256
shuffle = false
num_workers = 1
